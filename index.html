<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bakery Run</title>
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: #f9fafb;
        font-family: system-ui, -apple-system, sans-serif;
        transition: opacity 0.3s ease;
      }
      #boot-splash.hiding {
        opacity: 0;
        pointer-events: none;
      }
      .bs-scene {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .bs-croissant {
        width: 64px;
        height: 64px;
        animation: bs-float 2.4s ease-in-out infinite;
        filter: drop-shadow(0 4px 6px rgb(0 0 0 / 0.1));
      }
      .bs-steam {
        position: absolute;
        top: -16px;
        width: 100%;
        display: flex;
        justify-content: center;
      }
      .bs-steam span {
        position: absolute;
        height: 12px;
        width: 4px;
        border-radius: 9999px;
        background: #d1d5db;
        animation: bs-steam 1.8s ease-in-out infinite;
      }
      .bs-text {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .bs-title {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: #111827;
      }
      .bs-dots {
        display: flex;
        gap: 6px;
      }
      .bs-dots span {
        width: 6px;
        height: 6px;
        border-radius: 9999px;
        background: #f59e0b;
        animation: bs-dot 1.2s ease-in-out infinite;
      }
      @keyframes bs-float {
        0%,
        100% {
          transform: translateY(0) rotate(-2deg);
        }
        50% {
          transform: translateY(-5px) rotate(2deg);
        }
      }
      @keyframes bs-steam {
        0% {
          transform: translateY(0) scaleX(1);
          opacity: 0;
        }
        25% {
          opacity: 0.7;
        }
        100% {
          transform: translateY(-14px) scaleX(1.4);
          opacity: 0;
        }
      }
      @keyframes bs-dot {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        40% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash * {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash">
      <div class="bs-scene">
        <div class="bs-steam" aria-hidden="true">
          <span style="left: 32%"></span>
          <span style="left: 50%; animation-delay: 0.4s"></span>
          <span style="left: 66%; animation-delay: 0.8s"></span>
        </div>
        <svg
          class="bs-croissant"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path d="M13.9 6.3a7.5 7.5 0 1 0 0 13.4 6.8 6.8 0 0 1 0-13.4z" fill="#b45309" />
          <path d="M13.9 4.3a7.5 7.5 0 1 0 0 13.4 6.8 6.8 0 0 1 0-13.4z" fill="#fbbf24" />
          <path
            d="M5.2 5.7l4.11 1.9M3 11h5.4M5.2 16.3l4.11-1.9"
            stroke="#d97706"
            stroke-width="0.9"
            stroke-linecap="round"
            fill="none"
          />
        </svg>
      </div>
      <div class="bs-text">
        <p class="bs-title">Today's Order</p>
        <div class="bs-dots" aria-hidden="true">
          <span></span>
          <span style="animation-delay: 0.15s"></span>
          <span style="animation-delay: 0.3s"></span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script type="module">
      import { registerSW } from 'virtual:pwa-register'

      const updateSW = registerSW({
        onNeedRefresh() {
          if (window.confirm('A new version of Bakery Run is available. Reload to update?')) {
            updateSW(true)
          }
        },
      })
    </script>
  </body>
</html>
